<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagram Solver</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <div class="top-section">
        <input
            type="text"
            id="letters"
            maxlength="6"
            placeholder="Enter Letters"
            autocomplete="off"
            spellcheck="false"
            aria-label="Enter up to 6 letters to solve">

        <button id="solveBtn" disabled aria-label="Solve anagram">Solve</button>
    </div>

    <!-- Inline error message replaces alert() -->
    <div id="inputError" class="input-error" aria-live="assertive"></div>

    <div class="board-section">

        <div class="side-panel">
            <div class="timer-card">
                <div class="icon">⏱</div>
                <!-- id added: shows Loading… → Ready → solve time in ms -->
                <div id="timerDisplay" class="time">Loading…</div>
            </div>
        </div>

        <div class="game-board">

            <div class="answer-row">
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
                <div class="answer-slot"></div>
            </div>

            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>

        </div>

        <div class="side-panel">
            <div class="score-card">
                <div class="score-title">Words Found</div>
                <div id="wordCount" class="score-number">0</div>
            </div>
        </div>

    </div>

    <!-- hidden attribute: results panel is invisible until first solve -->
    <div id="results" hidden aria-live="polite"></div>

</div>

<script src="script.js"></script>

</body>
</html>
